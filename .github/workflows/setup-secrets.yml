name: Setup / Rotate Secrets

on:
  workflow_dispatch:
    inputs:
      action:
        description: "What to do"
        required: true
        type: choice
        options:
          - setup-all
          - rotate-jwt
      admin_password:
        description: "Admin password (leave blank to auto-generate)"
        required: false
        type: string

jobs:
  secrets:
    name: Generate & push secrets to Fly.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Generate and set ALL secrets
        if: inputs.action == 'setup-all'
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          JWT_SECRET=$(openssl rand -hex 32)

          if [ -n "${{ inputs.admin_password }}" ]; then
            ADMIN_PW="${{ inputs.admin_password }}"
          else
            ADMIN_PW=$(openssl rand -base64 18)
            echo "::add-mask::$ADMIN_PW"
            echo "::notice::Admin password was auto-generated. Retrieve it with: fly ssh console -C 'printenv POKERLOG_ADMIN_PASSWORD'"
          fi

          flyctl secrets set \
            POKERLOG_ADMIN_PASSWORD="$ADMIN_PW" \
            POKERLOG_JWT_SECRET="$JWT_SECRET"

          echo "✓ All secrets set."

      - name: Rotate JWT secret only
        if: inputs.action == 'rotate-jwt'
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          JWT_SECRET=$(openssl rand -hex 32)
          flyctl secrets set POKERLOG_JWT_SECRET="$JWT_SECRET"
          echo "✓ JWT secret rotated."


